name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check required secrets are set
        env:
          STRIPE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY length: ${#STRIPE_KEY}"
          echo "NEXT_PUBLIC_API_URL length: ${#API_URL}"
          if [ ${#STRIPE_KEY} -eq 0 ]; then
            echo "ERROR: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY secret is empty or not set!"
            echo "Go to Settings → Secrets → Actions and add NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"
          fi

      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_KEY }}

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # NOTE: The Render CMS server is NOT automatically redeployed from this
  # workflow. autoDeploy is set to false in render.yaml to prevent the
  # SQLite database from being wiped on every push.
  #
  # To redeploy the CMS server after genuine code changes:
  #   1. Export a data backup from the CMS: Settings → Backup & Restore
  #   2. Click "Manual Deploy" in the Render dashboard
  #   3. Re-import the backup after the new version starts up
