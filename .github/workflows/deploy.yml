name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check required secrets are set
        env:
          STRIPE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY length: ${#STRIPE_KEY}"
          echo "NEXT_PUBLIC_API_URL length: ${#API_URL}"
          if [ ${#STRIPE_KEY} -eq 0 ]; then
            echo "ERROR: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY secret is empty or not set!"
            echo "Go to Settings → Secrets → Actions and add NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"
          fi

      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_KEY }}

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  deploy-render:
    name: Deploy CMS server (server/ files changed)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # Only redeploy Render when files under server/ actually changed.
      # CMS content commits use [skip ci] so deploy.yml is already skipped
      # for them; this extra check guards against frontend-only pushes.
      # With autoDeploy: false in render.yaml, Render ignores GitHub pushes
      # directly — this hook is the only way a deploy is triggered.
      - name: Check if server files changed
        id: server_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^server/"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Render redeploy
        if: steps.server_changed.outputs.changed == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping Render deploy."
            exit 0
          fi
          echo "server/ files changed — triggering Render deploy..."
          curl -sf "$RENDER_DEPLOY_HOOK_URL" && echo "Render deploy triggered." || echo "Deploy hook call failed (non-fatal)."
