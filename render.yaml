# Render.com deployment blueprint for the Neurotonics CMS server.
#
# To deploy:
#   1. Go to https://dashboard.render.com/
#   2. Click "New" → "Blueprint"
#   3. Connect your GitHub repo (elitedigitalconsulting/neurotonics)
#   4. Render will read this file and create the web service
#   5. Fill in the required environment variables (marked sync: false)
#   6. Click "Apply"

services:
  - type: web
    name: neurotonics-cms
    env: node
    region: oregon          # closest free-tier region to Australia; change to 'singapore' if preferred
    plan: free
    rootDir: server
    buildCommand: npm install && npm rebuild better-sqlite3 && (npm run build:admin || echo "[warn] Admin UI build failed — using pre-committed assets")
    startCommand: node index.js
    healthCheckPath: /health

    # CRITICAL: autoDeploy MUST stay false.
    #
    # The CMS content-save workflow commits JSON changes to the main branch
    # (with [skip ci] to skip GitHub Actions). Without autoDeploy: false,
    # Render would redeploy on every CMS save. Free-tier services do not support
    # Blueprint disks, so the SQLite database is ephemeral and safe CMS tables
    # are restored from the GitHub backup on startup.
    #
    # Server code deploys are triggered only via the Render dashboard
    # "Manual Deploy" button, which gives the admin time to download a
    # data backup first (Settings → Backup & Restore in the CMS).
    autoDeploy: false

    envVars:
      # -----------------------------------------------------------------------
      # Required — set these in the Render dashboard after deploying
      # -----------------------------------------------------------------------

      # Stripe (from https://dashboard.stripe.com/apikeys)
      - key: STRIPE_SECRET_KEY
        sync: false

      # Stripe publishable key (starts with pk_live_ or pk_test_)
      # Returned to the frontend alongside the PaymentIntent clientSecret
      # so Stripe.js can be initialised at runtime without a build-time env var.
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false

      # Stripe webhook signing secret (from https://dashboard.stripe.com/webhooks)
      # Create a webhook endpoint pointing to: https://<your-render-url>/stripe/webhook
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # CMS JWT secrets — auto-generated unique values
      - key: CMS_JWT_SECRET
        generateValue: true

      - key: CMS_JWT_REFRESH_SECRET
        generateValue: true

      # Initial admin account (created on first boot if no users exist).
      # To reset an existing admin's email/password: set FORCE_ADMIN_RESET=true
      # in the Render dashboard, redeploy, then remove FORCE_ADMIN_RESET.
      - key: ADMIN_INITIAL_EMAIL
        value: admin@elitedigitalconsulting.com.au

      - key: ADMIN_INITIAL_PASSWORD
        sync: false

      # Set to "true" in the Render dashboard to force-update the admin credentials
      # from ADMIN_INITIAL_EMAIL / ADMIN_INITIAL_PASSWORD on next start.
      # Remove after successful login.
      - key: FORCE_ADMIN_RESET
        sync: false

      # -----------------------------------------------------------------------
      # Allowed CORS origins — update to include your GitHub Pages URL
      # -----------------------------------------------------------------------
      - key: CLIENT_ORIGINS
        value: https://elitedigitalconsulting.github.io

      # -----------------------------------------------------------------------
      # Email — choose ONE provider:
      #
      # Option A (recommended): Resend — free 3,000 emails/month
      #   Sign up at resend.com, add your domain (or use @resend.dev for testing),
      #   then set RESEND_API_KEY and RESEND_FROM_EMAIL below.
      #
      # Option B: SMTP — Gmail App Password or any SMTP provider
      #   Requires EMAIL_USER + EMAIL_PASS. For Gmail, enable 2FA and create
      #   an App Password at myaccount.google.com/apppasswords
      # -----------------------------------------------------------------------

      # Resend (Option A — recommended)
      - key: RESEND_API_KEY
        sync: false

      - key: RESEND_FROM_EMAIL
        value: Neurotonics <orders@neurotonics.com.au>

      # SMTP (Option B — fallback if RESEND_API_KEY is not set)
      - key: EMAIL_HOST
        value: smtp.gmail.com

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_SECURE
        value: "false"

      - key: EMAIL_USER
        sync: false

      - key: EMAIL_PASS
        sync: false

      - key: EMAIL_FROM
        value: noreply@neurotonics.com.au

      - key: STOCKIST_EMAIL
        value: admin@elitedigitalconsulting.com.au

      # -----------------------------------------------------------------------
      # GitHub PAT — used by the CMS to trigger a Pages rebuild after content
      # changes. Create a PAT at https://github.com/settings/tokens (repo scope)
      # -----------------------------------------------------------------------
      - key: GITHUB_PAT
        sync: false

      - key: GITHUB_OWNER
        value: elitedigitalconsulting

      - key: GITHUB_REPO
        value: neurotonics

      # -----------------------------------------------------------------------
      # Runtime
      # -----------------------------------------------------------------------
      - key: NODE_ENV
        value: production

      # Pin Node.js to v20 LTS — matches GitHub Actions and ensures
      # better-sqlite3 native binaries are compatible across deploys.
      - key: NODE_VERSION
        value: "20"

